<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: Roboto, Arial, sans-serif;
            background: #f3f3f3;
            margin: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .title {
            font-size: 16px;
            font-weight: 600;
            color: #202124;
            margin: 0;
        }
        .description {
            font-size: 13px;
            color: #5f6368;
            margin: 0;
        }
        button {
            padding: 10px 16px;
            background: linear-gradient(90deg, #ff512f 0%, #dd2476 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(221, 36, 118, 0.3);
        }
        button:active {
            transform: scale(0.98);
        }
        .reset-btn {
            background: linear-gradient(90deg, #34a853 0%, #1e8e3e 100%);
        }
        .reset-btn:hover {
            box-shadow: 0 2px 8px rgba(52, 168, 83, 0.3);
        }
        .info {
            padding: 8px 12px;
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
            border-radius: 4px;
            font-size: 12px;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">YouTube Shorts Auto-Scroller</h2>
        <p class="description">Manage your auto-scroll settings</p>
        
        <div class="info">
            ℹ️ Click the reset button to restore the button to its default position.
        </div>
        
        <button class="reset-btn" id="resetBtn">🔄 Reset Button Position</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
